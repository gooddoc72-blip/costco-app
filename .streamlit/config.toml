[server]
headless = true
port = 8501
# 앱을 /app 서브경로로 서빙 (루트 cocobiz.shop = 랜딩페이지)
baseUrlPath = "app"
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#E31837"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F7F8FA"
textColor = "#1F2937"
font = "sans serif"
