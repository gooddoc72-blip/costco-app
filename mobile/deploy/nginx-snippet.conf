# /etc/nginx/sites-available/costco-app 에 추가/교체할 설정
# 모바일 User-Agent → Next.js (포트 3000)
# 그 외 → Streamlit (포트 8501)

map $http_user_agent $is_mobile {
    default 0;
    "~*Mobile|Android|iPhone|iPad|iPod|webOS" 1;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name costcobiz.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name costcobiz.shop;

    # SSL 인증서 (certbot이 자동 관리)
    ssl_certificate     /etc/letsencrypt/live/costcobiz.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/costcobiz.shop/privkey.pem;

    client_max_body_size 50M;

    # /m/* — 항상 모바일 (강제)
    location /m/ {
        rewrite ^/m/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 루트 — User-Agent 자동 분기
    location / {
        # 모바일이면 Next.js, PC면 Streamlit
        if ($is_mobile) {
            proxy_pass http://127.0.0.1:3000;
        }
        proxy_pass http://127.0.0.1:8501;

        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout    86400;
        proxy_send_timeout    86400;
        proxy_connect_timeout 86400;
    }

    location /_stcore/stream {
        proxy_pass http://127.0.0.1:8501/_stcore/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade   $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
