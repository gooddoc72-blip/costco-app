# /etc/nginx/sites-available/costco-app
# 전 사용자(모바일+PC) → Next.js (포트 3000) 기본
# /legacy/* → Streamlit (포트 8501) — Next.js로 아직 마이그레이션 안 된 기능용
#
# 이전 버전과 호환: /m/* 경로도 그대로 Next.js로 (북마크 안 깨짐)

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name costcobiz.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name costcobiz.shop;

    # SSL 인증서 (certbot이 자동 관리)
    ssl_certificate     /etc/letsencrypt/live/costcobiz.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/costcobiz.shop/privkey.pem;

    client_max_body_size 50M;

    # ── /legacy/* — Streamlit (마이그레이션 안 된 기능: 영수증, 정산매칭, 자동화 등) ──
    location /legacy/ {
        rewrite ^/legacy/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout    86400;
        proxy_send_timeout    86400;
        proxy_connect_timeout 86400;
    }

    # Streamlit websocket (legacy 경로용 — Streamlit 내부 경로 그대로 받음)
    location /_stcore/ {
        proxy_pass http://127.0.0.1:8501/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade   $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
    }

    # ── /m/* — 호환성: 기존 모바일 북마크 그대로 Next.js로 ──
    location /m/ {
        rewrite ^/m/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 그 외 전체 → Next.js ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout    86400;
        proxy_send_timeout    86400;
        proxy_connect_timeout 86400;
    }
}
