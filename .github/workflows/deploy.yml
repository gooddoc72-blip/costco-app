name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/costco-app
            git pull origin main
            /opt/costco-app/venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart costco-app
            echo "✅ 배포 완료"
