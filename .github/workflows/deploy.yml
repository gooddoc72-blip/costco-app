name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/costco-app
            git pull origin main
            /opt/costco-app/venv/bin/pip install -r requirements.txt -q
            sudo systemctl restart costco-app
            # 모바일 빌드/재시작 — mobile/ 변경 있을 때만
            if git diff --name-only HEAD@{1} HEAD 2>/dev/null | grep -q '^mobile/'; then
              cd /opt/costco-app/mobile
              npm install --silent
              npm run build
              sudo systemctl restart costco-mobile || true
              echo "📱 모바일 재배포 완료"
            fi
            echo "✅ 배포 완료"
