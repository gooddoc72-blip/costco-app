# Phase4 — costco-app nginx server{} 블록 안에 추가할 location 2개.
# (기존 /license/ 8600, /app 8501, / 랜딩과 공존. 443 ssl 블록 내부에 삽입.)
#
# 적용:
#   1) sudo cp /etc/nginx/sites-enabled/costco-app /etc/nginx/sites-enabled/costco-app.bak
#   2) 아래 두 location 을 server{ ... } (listen 443) 안에 붙여넣기
#   3) sudo nginx -t && sudo systemctl reload nginx

    # 수익계산 API (FastAPI/uvicorn 8610) — Streamlit 세션(sid) 재사용
    location /api/ {
        proxy_pass         http://127.0.0.1:8610;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        client_max_body_size 50M;
    }

    # 수익계산 React 정적앱 (Next.js export, basePath=/calc)
    location /calc/ {
        alias /opt/costco-app/web-out/;
        try_files $uri $uri/ /calc/index.html;
    }
